<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerber Viewer — DeltaProto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ===== DeltaProto Design Tokens ===== */
        :root {
            --bg: #f2f2f2;
            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --bg-viewer: #e8e8e8;
            --fg: #262626;
            --fg-muted: #595959;
            --fg-faint: #999;
            --border: #bfbfbf;
            --border-subtle: #d9d9d9;
            --primary: #2e84cc;
            --primary-hover: #2574b8;
            --primary-fg: #ffffff;
            --accent-red: #d82a30;
            --ring: #2e84cc;
            --item-bg: #f5f5f5;
            --item-hover: #ebebeb;
            --tab-active-bg: #ffffff;
            --tooltip-bg: #ffffff;
            --tooltip-border: #d9d9d9;
            --tooltip-shadow: rgba(0,0,0,0.1);
            --drag-tint: rgba(46,132,204,0.08);
            --loading-bg: rgba(255,255,255,0.95);
            --grid-line: rgba(0,0,0,0.04);
            --checkbox-accent: #2e84cc;
            --progress-from: #2e84cc;
            --progress-to: #5ba3dd;
            --spinner-track: #d9d9d9;
        }
        .dark {
            --bg: #1a1a1a;
            --bg-card: #1f1f1f;
            --bg-input: #2a2a2a;
            --bg-viewer: #141414;
            --fg: #d9d9d9;
            --fg-muted: #8c8c8c;
            --fg-faint: #666;
            --border: #404040;
            --border-subtle: #333;
            --primary: #2e84cc;
            --primary-hover: #3a93dd;
            --primary-fg: #ffffff;
            --accent-red: #d82a30;
            --ring: #2e84cc;
            --item-bg: #262626;
            --item-hover: #333;
            --tab-active-bg: #141414;
            --tooltip-bg: #1f1f1f;
            --tooltip-border: #404040;
            --tooltip-shadow: rgba(0,0,0,0.5);
            --drag-tint: rgba(46,132,204,0.1);
            --loading-bg: rgba(31,31,31,0.95);
            --grid-line: rgba(255,255,255,0.03);
            --checkbox-accent: #2e84cc;
            --progress-from: #2e84cc;
            --progress-to: #5ba3dd;
            --spinner-track: #404040;
        }

        /* ===== Base ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--fg); height: 100vh;
            display: flex; flex-direction: column; transition: background 0.2s, color 0.2s;
        }

        /* ===== Scrollbar ===== */
        * { scrollbar-color: var(--border) transparent; scrollbar-width: thin; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

        /* ===== Header ===== */
        header {
            background: var(--bg-card); padding: 10px 20px; display: flex;
            align-items: center; gap: 16px; border-bottom: 1px solid var(--border);
            height: 56px;
        }
        .header-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .header-brand svg { height: 32px; width: 32px; flex-shrink: 0; }
        header h1 { font-size: 1.125rem; font-weight: 600; color: var(--fg); }
        header h1 span { color: var(--fg-muted); font-weight: 400; }
        .upload-btn {
            background: var(--primary); color: var(--primary-fg); border: none; padding: 7px 16px;
            border-radius: 8px; cursor: pointer; font-size: 0.875rem; font-weight: 500;
            transition: background 0.15s; font-family: inherit;
        }
        .upload-btn:hover { background: var(--primary-hover); }
        #file-input { display: none; }
        .example-btn {
            background: none; color: var(--primary); border: none; padding: 7px 4px;
            cursor: pointer; font-size: 0.875rem; font-weight: 500; font-family: inherit;
            text-decoration: underline; text-underline-offset: 2px;
            transition: color 0.15s;
        }
        .example-btn:hover { color: var(--primary-hover); }
        .theme-toggle {
            background: none; border: 1px solid var(--border); width: 36px; height: 36px;
            border-radius: 8px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; color: var(--fg-muted); transition: background 0.15s, color 0.15s;
        }
        .theme-toggle:hover { background: var(--item-hover); color: var(--fg); }
        .zoom-controls { display: flex; gap: 6px; margin-left: auto; align-items: center; }
        .zoom-btn {
            background: var(--bg-input); color: var(--fg); border: 1px solid var(--border);
            width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s; font-family: inherit;
        }
        .zoom-btn:hover { background: var(--item-hover); }
        .zoom-level {
            background: var(--bg-input); border: 1px solid var(--border); padding: 6px 10px;
            border-radius: 8px; font-size: 0.8rem; min-width: 56px; text-align: center;
            color: var(--fg-muted);
        }

        /* ===== Layout ===== */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 280px; flex-shrink: 0; background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
        }
        .sidebar-resizer {
            width: 5px; flex-shrink: 0; cursor: col-resize; background: transparent;
            transition: background 0.15s; margin-left: -3px; z-index: 10; position: relative;
        }
        .sidebar-resizer:hover, .sidebar-resizer.dragging { background: var(--primary); }
        body.resizing-sidebar { cursor: col-resize; user-select: none; }
        body.resizing-sidebar * { cursor: col-resize !important; }
        .sidebar h2 {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--fg-muted); margin-bottom: 4px; font-weight: 600;
        }

        /* ===== View Tabs ===== */
        .view-tabs {
            display: flex; gap: 2px; padding: 8px 16px; background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }
        .view-tab {
            background: transparent; color: var(--fg-muted); border: none; padding: 8px 16px;
            border-radius: 8px 8px 0 0; cursor: pointer; font-size: 0.8125rem;
            transition: background 0.15s, color 0.15s; font-family: inherit; font-weight: 500;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        }
        .view-tab:hover { background: var(--item-hover); color: var(--fg); }
        .view-tab.active { background: var(--tab-active-bg); color: var(--primary); font-weight: 600; }
        .view-tab:disabled { cursor: not-allowed; opacity: 0.4; }
        .view-tab svg { width: 14px; height: 14px; flex-shrink: 0; }
        .btn-spinner {
            width: 14px; height: 14px; border: 2px solid var(--spinner-track);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; display: inline-block; flex-shrink: 0;
        }

        /* ===== Layer Controls ===== */
        .layer-type-select {
            background: var(--bg-input); color: var(--fg-muted); border: 1px solid var(--border);
            border-radius: 6px; padding: 2px 4px; font-size: 0.6875rem;
            cursor: pointer; max-width: 100px; font-family: inherit;
        }
        .layer-type-select:focus { outline: 2px solid var(--ring); outline-offset: -1px; }
        .side-btn {
            background: var(--bg-input); color: var(--fg-muted); border: 1px solid var(--border);
            padding: 2px 8px; border-radius: 6px; cursor: pointer; font-size: 0.6875rem;
            transition: background 0.15s, color 0.15s; font-family: inherit; font-weight: 500;
        }
        .side-btn:hover { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
        .layer-list { display: flex; flex-direction: column; gap: 3px; }
        .layer-item {
            display: flex; align-items: center; gap: 10px; padding: 8px 10px;
            background: var(--item-bg); border-radius: 8px; cursor: pointer;
            transition: background 0.15s; border: 1px solid transparent;
        }
        .layer-item:hover { background: var(--item-hover); border-color: var(--border-subtle); }
        .layer-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--checkbox-accent); }
        .layer-item .color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 1px rgba(0,0,0,0.1); }
        .layer-item .name {
            flex: 1; font-size: 0.8125rem; white-space: nowrap;
            overflow: hidden; display: flex; min-width: 0;
        }
        .layer-item .name-start {
            overflow: hidden; text-overflow: ellipsis;
            flex: 0 1 auto; min-width: 0;
        }
        .layer-item .name-ext { flex-shrink: 0; }
        .layer-item .name[title] { position: relative; }
        .layer-item .name:hover::after {
            content: attr(title); position: absolute; left: 0; top: 100%;
            background: var(--tooltip-bg); color: var(--fg); padding: 4px 8px; border-radius: 6px;
            font-size: 0.75rem; white-space: nowrap; z-index: 100;
            border: 1px solid var(--tooltip-border); box-shadow: 0 4px 12px var(--tooltip-shadow);
            pointer-events: none;
        }

        /* ===== Viewer ===== */
        .viewer-container {
            flex: 1; position: relative; overflow: hidden; background: var(--bg-viewer);
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        #svg-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: grab; }
        #svg-container:active { cursor: grabbing; }
        #svg-content { transform-origin: 0 0; }
        .drop-zone {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: var(--fg-faint);
        }
        .drop-zone svg { width: 80px; height: 80px; margin-bottom: 16px; opacity: 0.4; }
        .drop-zone p { font-size: 1.1rem; margin-bottom: 8px; }
        .drop-zone small { font-size: 0.85rem; color: var(--fg-faint); }
        .drag-over { background: var(--drag-tint) !important; }
        .loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: var(--loading-bg); padding: 32px 48px;
            border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); border: 1px solid var(--border);
        }
        .spinner {
            width: 48px; height: 48px; border: 3px solid var(--spinner-track);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 16px; font-size: 1rem; color: var(--fg); }
        .loading-status { margin-top: 8px; font-size: 0.8125rem; color: var(--fg-muted); min-height: 20px; }
        .progress-bar { width: 200px; height: 4px; background: var(--spinner-track); border-radius: 2px; margin: 16px auto 0; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--progress-from), var(--progress-to)); border-radius: 2px; transition: width 0.3s ease; width: 0%; }
        .progress-bar-indeterminate .progress-bar-fill { width: 30%; animation: indeterminate 1.5s ease-in-out infinite; }
        @keyframes indeterminate { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
        .hidden { display: none !important; }
        .no-layers { color: var(--fg-faint); font-size: 0.8125rem; padding: 20px; text-align: center; }
        .recent-item {
            display: flex; align-items: center; gap: 8px; padding: 8px 10px;
            background: var(--item-bg); border-radius: 8px; cursor: pointer;
            transition: background 0.15s; font-size: 0.8125rem;
        }
        .recent-item:hover { background: var(--item-hover); }
        .recent-item .date { color: var(--fg-faint); font-size: 0.6875rem; margin-left: auto; }

        /* ===== Centroid Panel ===== */
        #centroid-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
        .centroid-toolbar {
            background: var(--bg-card); border-bottom: 1px solid var(--border);
            padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
        }
        .centroid-search {
            flex: 1; max-width: 280px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; padding: 6px 10px; font-size: 0.8125rem; color: var(--fg); font-family: inherit;
        }
        .centroid-search:focus { outline: 2px solid var(--ring); outline-offset: -1px; }
        .centroid-toolbar-count { font-size: 0.8125rem; color: var(--fg-muted); }
        .centroid-toolbar-export {
            background: var(--bg-input); color: var(--fg); border: 1px solid var(--border);
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8125rem;
            font-family: inherit; font-weight: 500; transition: background 0.15s;
        }
        .centroid-toolbar-export:hover { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
        .centroid-table-wrap { flex: 1; overflow: auto; }
        .centroid-table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
        .centroid-table thead th {
            position: sticky; top: 0; background: var(--bg-card); border-bottom: 1px solid var(--border);
            padding: 8px 12px; text-align: left; font-weight: 600; color: var(--fg-muted);
            white-space: nowrap; cursor: pointer; user-select: none;
        }
        .centroid-table thead th:hover { color: var(--fg); background: var(--item-hover); }
        .centroid-table thead th.sorted-asc::after  { content: ' ▲'; font-size: 0.625rem; }
        .centroid-table thead th.sorted-desc::after { content: ' ▼'; font-size: 0.625rem; }
        .centroid-table tbody tr { border-bottom: 1px solid var(--border-subtle); }
        .centroid-table tbody tr:hover { background: var(--item-hover); }
        .centroid-table tbody td { padding: 7px 12px; }
        .centroid-refdes-pill {
            display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;
        }
        .centroid-refdes-pill.side-top    { background: rgba(106,174,214,0.18); color: #6aaed6; }
        .centroid-refdes-pill.side-bottom { background: rgba(232,150,84,0.18);  color: #e89654; }
        .centroid-num { color: var(--fg-faint); font-size: 0.75rem; }
    </style>
</head>

                </div>
                <div id="recent-list"></div>
            </div>
        </aside>
        <div class="sidebar-resizer" id="sidebar-resizer" title="Drag to resize"></div>

        <div style="flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0;">

                                <th data-col="side" onclick="sortCentroidTable('side')">Side</th>
                                <th data-col="value" onclick="sortCentroidTable('value')">Value</th>
                                <th data-col="footprint" onclick="sortCentroidTable('footprint')">Footprint</th>
                                <th data-col="x" onclick="sortCentroidTable('x')">X (mm)</th>
                                <th data-col="y" onclick="sortCentroidTable('y')">Y (mm)</th>
                                <th data-col="rotation" onclick="sortCentroidTable('rotation')">Rotation</th>
                                <th data-col="mountType" onclick="sortCentroidTable('mountType')">Mount</th>
                            </tr>
                        </thead>
                        <tbody id="centroid-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== State =====
        let layers = [];
        let projectFiles = [];  // [{name, content, fileType, layerType, color}]
        let projectName = '';
        let combinedSvg = '';
        let realisticTopSvg = null;
        let realisticBottomSvg = null;
        let currentView = 'layers';
        let scale = 1, panX = 0, panY = 0, isPanning = false, startX, startY;
        let components = [];  // [{refdes, value, footprint, mountType, x, y, rotation, side}]

        // DOM refs
        const fileInput = document.getElementById('file-input');
        const layerList = document.getElementById('layer-list');
        const svgContainer = document.getElementById('svg-container');
        const svgContent = document.getElementById('svg-content');
        const viewerContainer = document.getElementById('viewer-container');
        const dropZone = document.getElementById('drop-zone');
        const loading = document.getElementById('loading');
        const zoomLevel = document.getElementById('zoom-level');

        // ===== Browser-side file type detection (ported from Java) =====
        function detectFileType(name, content) {
            const lower = name.toLowerCase();
            const drillExts = ['.drl','.xln','.exc','.ncd','.drd'];
            if (drillExts.some(e => lower.endsWith(e))) return 'drill';
            if (lower.endsWith('.txt') && (content.includes('M48') || content.includes('T01C') ||
                content.includes('METRIC') || content.includes('INCH'))) return 'drill';
            if (content.includes('M48') || content.includes('T01C')) return 'drill';
            if (content.includes('%FS') || content.includes('%MO') ||
                content.includes('G04') || content.includes('%ADD')) return 'gerber';
            const gerberExts = ['.gbr','.ger','.gtl','.gbl','.gts','.gbs','.gto','.gbo',
                '.gtp','.gbp','.gm1','.gko','.g1','.g2','.g3','.cmp','.sol','.stc','.sts','.plc','.pls'];
            if (gerberExts.some(e => lower.endsWith(e))) return 'gerber';
            return 'unknown';
        }

        function detectPcbLayerType(name, fileType, content) {
            const lower = name.toLowerCase();
            if (fileType === 'drill') return 'DRILL';

            // KiCad (and other EDAs) emit drill data as Gerber X2 with .gbr extension.
            // The TF.FileFunction attribute is the authoritative signal; filename
            // patterns like "-pth-drl.gbr" / "-npth-drl.gbr" / "-drill.gbr" are the
            // fallback when the content hasn't been scanned.
            if (content) {
                const ffMatch = content.match(/%TF\.FileFunction,([^*%]+)\*/);
                if (ffMatch) {
                    const parts = ffMatch[1].split(',').map(s => s.trim());
                    // KiCad's NPTH export omits the trailing "Drill" token, so the
                    // PTH/NPTH tokens on their own are treated as drill signals too.
                    if (parts.some(p => p === 'NPTH')) return 'DRILL_NON_PLATED';
                    if (parts.some(p => p === 'PTH')) return 'DRILL_PLATED';
                    if (parts.some(p => p === 'Drill' || p === 'Route')) {
                        if (parts.some(p => p === 'NonPlated')) return 'DRILL_NON_PLATED';
                        if (parts.some(p => p === 'Plated')) return 'DRILL_PLATED';
                        return 'DRILL';
                    }
                    if (parts[0] === 'Component') {
                        if (parts.some(p => p === 'Top')) return 'PNP_TOP';
                        if (parts.some(p => p === 'Bot' || p === 'Bottom')) return 'PNP_BOTTOM';
                    }
                }
            }
            if (/pnp[_.-]?top|top[_.-]?pnp/.test(lower)) return 'PNP_TOP';
            if (/pnp[_.-]?bot|bot[_.-]?pnp|pnp[_.-]?bottom|bottom[_.-]?pnp/.test(lower)) return 'PNP_BOTTOM';
            if (/-npth(?:[-_.]|$)|nonplated.*drl|npth.*drl/.test(lower)) return 'DRILL_NON_PLATED';
            if (/-pth(?:[-_.]|$)|[-_.]drl\.|drill\.gbr$/.test(lower)) return 'DRILL_PLATED';

            if (/\.gko$|\.gm\d*$|edge|outline|boardoutline|profile/.test(lower)) {
                // Only assign OUTLINE if the file has actual connected drawing content
                if (!content) return 'OUTLINE';
                // Must have coordinates
                if (!/X\d+Y\d+/.test(content)) return 'OTHER';
                // A connected outline has more draws (D01) than moves (D02).
                // Disconnected corner markers have equal or more D02s than D01s.
                const d01Count = (content.match(/D01\b/g) || []).length;
                const d02Count = (content.match(/D02\b/g) || []).length;
                if (d01Count > 0 && d02Count >= d01Count) return 'OTHER';
                return 'OUTLINE';
            }
            if (/gtl|f_cu|f\\.cu/.test(lower) || lower.endsWith('.cmp') || /top_copper|copper_top/.test(lower)) return 'COPPER_TOP';
            if (/gbl|b_cu|b\\.cu/.test(lower) || lower.endsWith('.sol') || /bottom_copper|copper_bottom/.test(lower)) return 'COPPER_BOTTOM';
            if (/gts|f_mask|f\\.mask/.test(lower) || lower.endsWith('.stc') || /soldermask_top|top_mask/.test(lower)) return 'SOLDERMASK_TOP';
            if (/gbs|b_mask|b\\.mask/.test(lower) || lower.endsWith('.sts') || /soldermask_bottom|bottom_mask/.test(lower)) return 'SOLDERMASK_BOTTOM';
            if (/gto|f_silks|f\\.silkscreen/.test(lower) || lower.endsWith('.plc') || /silkscreen_top|top_silk/.test(lower)) return 'SILKSCREEN_TOP';
            if (/gbo|b_silks|b\\.silkscreen/.test(lower) || lower.endsWith('.pls') || /silkscreen_bottom|bottom_silk/.test(lower)) return 'SILKSCREEN_BOTTOM';
            if (/gtp|f_paste/.test(lower)) return 'PASTE_TOP';
            if (/gbp|b_paste/.test(lower)) return 'PASTE_BOTTOM';
            return 'OTHER';
        }

        const LAYER_COLORS = {
            gtl:'#e94560', f_cu:'#e94560', cmp:'#e94560',
            gbl:'#4169e1', b_cu:'#4169e1', sol:'#4169e1',
            g1:'#ff6600', g2:'#ff8c00', g3:'#9932cc',
            gts:'#00aa00', gbs:'#006600', f_mask:'#00aa00', b_mask:'#006600', stc:'#00aa00', sts:'#006600',
            gto:'#ffffff', gbo:'#cccccc', f_silks:'#ffffff', b_silks:'#cccccc', plc:'#ffffff', pls:'#cccccc',
            gtp:'#888888', gbp:'#666666',
            gko:'#ffff00', gm1:'#ffff00', edge:'#ffff00',
            drl:'#00ffff', xln:'#00ffff', drd:'#00ffff',
            pnp:'#cc44cc'
        };

        function getLayerColor(name) {
            const lower = name.toLowerCase();
            for (const [key, color] of Object.entries(LAYER_COLORS)) {
                if (lower.includes(key)) return color;
            }
            return '#aaaaaa';
        }

        let commonPrefix = '';
        function computeCommonPrefix(names) {
            if (names.length < 2) return '';
            let p = names[0];
            for (let i = 1; i < names.length; i++) {
                let j = 0;
                while (j < p.length && j < names[i].length && p[j] === names[i][j]) j++;
                p = p.substring(0, j);
                if (!p) return '';
            }
            return p.length >= 3 ? p : '';
        }

        function splitFilename(name) {
            // Ellipsize the shared project prefix first so each unique suffix stays intact.
            if (commonPrefix && name.length > commonPrefix.length && name.startsWith(commonPrefix)) {
                const suffix = name.substring(commonPrefix.length);
                return `<span class="name-start">${commonPrefix}</span><span class="name-ext">${suffix}</span>`;
            }
            return `<span class="name-start">${name}</span>`;
        }

        // ===== Browser-side ZIP extraction =====
        async function extractZip(arrayBuffer) {
            const view = new DataView(arrayBuffer);
            const files = [];
            let offset = 0;
            while (offset < view.byteLength - 4) {
                if (view.getUint32(offset, true) !== 0x04034b50) break;
                const flags = view.getUint16(offset + 6, true);
                const method = view.getUint16(offset + 8, true);
                let compSize = view.getUint32(offset + 18, true);
                const uncompSize = view.getUint32(offset + 22, true);
                const nameLen = view.getUint16(offset + 26, true);
                const extraLen = view.getUint16(offset + 28, true);
                const name = new TextDecoder().decode(new Uint8Array(arrayBuffer, offset + 30, nameLen));
                const dataStart = offset + 30 + nameLen + extraLen;

                // Handle data descriptor (bit 3): sizes may be in trailing descriptor
                const hasDataDesc = (flags & 0x08) !== 0;
                if (hasDataDesc && compSize === 0) {
                    // Scan for next local file header or end-of-central-dir signature
                    let scanPos = dataStart;
                    while (scanPos < view.byteLength - 4) {
                        const sig = view.getUint32(scanPos, true);
                        if (sig === 0x04034b50 || sig === 0x02014b50 || sig === 0x06054b50) break;
                        // Check for data descriptor signature (optional)
                        if (sig === 0x08074b50) { compSize = scanPos - dataStart; break; }
                        scanPos++;
                    }
                    if (compSize === 0) compSize = scanPos - dataStart;
                }

                if (!name.endsWith('/') && !name.includes('__MACOSX') && !name.startsWith('.')) {
                    const compData = new Uint8Array(arrayBuffer, dataStart, compSize);
                    let content;
                    try {
                        if (method === 0) {
                            content = compData;
                        } else if (method === 8) {
                            const ds = new DecompressionStream('deflate-raw');
                            const writer = ds.writable.getWriter();
                            writer.write(compData);
                            writer.close();
                            const reader = ds.readable.getReader();
                            const chunks = [];
                            while (true) {
                                const {done, value} = await reader.read();
                                if (done) break;
                                chunks.push(value);
                            }
                            const total = chunks.reduce((s, c) => s + c.length, 0);
                            content = new Uint8Array(total);
                            let pos = 0;
                            for (const chunk of chunks) { content.set(chunk, pos); pos += chunk.length; }
                        }
                        if (content) {
                            const text = new TextDecoder().decode(content);
                            const shortName = name.includes('/') ? name.substring(name.lastIndexOf('/') + 1) : name;
                            if (shortName) files.push({name: shortName, content: text});
                        }
                    } catch (e) {
                        console.warn('Failed to extract', name, e);
                    }
                }

                // Advance past data + optional data descriptor
                offset = dataStart + compSize;
                if (hasDataDesc) {
                    if (offset + 4 <= view.byteLength && view.getUint32(offset, true) === 0x08074b50) offset += 16;
                    else if (offset + 12 <= view.byteLength) offset += 12;
                }
            }
            return files;
        }

        // ===== IndexedDB persistence =====
        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('gerber-viewer', 1);
                req.onupgradeneeded = () => {
                    const db = req.result;
                    if (!db.objectStoreNames.contains('projects')) {
                        db.createObjectStore('projects', {keyPath: 'id', autoIncrement: true});
                    }
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function saveProject(name, files) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('projects', 'readwrite');
                const store = tx.objectStore('projects');
                // Keep only the last 5 projects
                const getAll = store.getAll();
                getAll.onsuccess = () => {
                    const existing = getAll.result.sort((a, b) => b.timestamp - a.timestamp);
                    // Remove old projects beyond limit
                    for (let i = 4; i < existing.length; i++) {
                        store.delete(existing[i].id);
                    }
                    // Remove duplicate by name
                    for (const p of existing) {
                        if (p.name === name) store.delete(p.id);
                    }
                    const record = {name, timestamp: Date.now(), files};
                    const addReq = store.add(record);
                    addReq.onsuccess = () => resolve(addReq.result);
                    addReq.onerror = () => reject(addReq.error);
                };
            });
        }

        async function loadProject(id) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('projects', 'readonly');
                const req = tx.objectStore('projects').get(id);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function listProjects() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('projects', 'readonly');
                const req = tx.objectStore('projects').getAll();
                req.onsuccess = () => resolve(req.result.sort((a, b) => b.timestamp - a.timestamp));
                req.onerror = () => reject(req.error);
            });
        }

        async function clearRecentProjects() {
            const db = await openDB();
            const tx = db.transaction('projects', 'readwrite');
            tx.objectStore('projects').clear();
            document.getElementById('recent-section').classList.add('hidden');
        }

        // ===== Send files to server for rendering =====
        function buildLayerBody(files) {
            const encoder = new TextEncoder();
            const parts = [];
            for (const f of files) {
                if (f.fileType === 'unknown') continue;
                const contentBytes = encoder.encode(f.content);
                const header = `FILE\t${f.name}\t${f.fileType}\t${f.layerType}\t${contentBytes.length}\n`;
                parts.push(encoder.encode(header));
                parts.push(contentBytes);
                parts.push(encoder.encode('\n'));
            }
            return new Blob(parts);
        }

        async function sendRenderRequest(files) {
            const resp = await fetch('/api/gerber/render', {method: 'POST', body: buildLayerBody(files)});
            if (!resp.ok) throw new Error('Server error: ' + resp.status);
            return await resp.json();
        }

        // ===== Download realistic view as PNG thumbnail =====
        async function downloadThumbnail(side) {
            if (!projectFiles || projectFiles.length === 0) return;
            const btn = document.getElementById(side === 'top' ? 'png-top-btn' : 'png-bot-btn');
            if (btn.disabled) return;
            // Lock the button's current size so swapping to a spinner doesn't reflow the tab bar.
            const rect = btn.getBoundingClientRect();
            const originalHtml = btn.innerHTML;
            btn.style.width = rect.width + 'px';
            btn.style.height = rect.height + 'px';
            btn.disabled = true;
            btn.innerHTML = '<span class="btn-spinner" aria-label="Generating"></span>';
            try {
                // Request a reasonably large width — usable as a thumbnail AND for
                // closer inspection. Project-list consumers can call the endpoint
                // directly with a smaller width.
                const width = 800;
                const resp = await fetch(`/api/gerber/thumbnail?side=${side}&width=${width}`,
                    {method: 'POST', body: buildLayerBody(projectFiles)});
                if (!resp.ok) throw new Error('Server error: ' + resp.status);
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const base = (projectName || 'board').replace(/[^a-zA-Z0-9._-]/g, '_');
                a.download = `${base}-${side}.png`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            } catch (e) {
                alert('Failed to render PNG: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
                btn.style.width = '';
                btn.style.height = '';
            }
        }

        // ===== Layer type constants =====
        const LAYER_TYPES = ['OUTLINE','COPPER_TOP','COPPER_BOTTOM','SOLDERMASK_TOP','SOLDERMASK_BOTTOM',
            'SILKSCREEN_TOP','SILKSCREEN_BOTTOM','PASTE_TOP','PASTE_BOTTOM','DRILL','DRILL_PLATED','DRILL_NON_PLATED',
            'PNP_TOP','PNP_BOTTOM','OTHER'];
        const LAYER_TYPE_LABELS = {
            'OUTLINE':'Outline','COPPER_TOP':'Cu Top','COPPER_BOTTOM':'Cu Bot',
            'SOLDERMASK_TOP':'Mask Top','SOLDERMASK_BOTTOM':'Mask Bot',
            'SILKSCREEN_TOP':'Silk Top','SILKSCREEN_BOTTOM':'Silk Bot',
            'PASTE_TOP':'Paste Top','PASTE_BOTTOM':'Paste Bot',
            'DRILL':'Drill','DRILL_PLATED':'Drill PTH','DRILL_NON_PLATED':'Drill NPTH',
            'PNP_TOP':'PnP Top','PNP_BOTTOM':'PnP Bot','OTHER':'Other'
        };

        // ===== File input & drag-drop =====
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) loadFile(e.target.files[0]);
        });
        viewerContainer.addEventListener('dragover', (e) => {
            e.preventDefault(); viewerContainer.classList.add('drag-over');
        });
        viewerContainer.addEventListener('dragleave', () => viewerContainer.classList.remove('drag-over'));
        viewerContainer.addEventListener('drop', (e) => {
            e.preventDefault(); viewerContainer.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) loadFile(e.dataTransfer.files[0]);
        });

        // ===== Main load flow =====
        async function loadExample() {
            const loadingStatus = document.getElementById('loading-status');
            const progressBar = document.querySelector('.progress-bar');
            dropZone.classList.add('hidden');
            loading.classList.remove('hidden');
            progressBar.classList.add('progress-bar-indeterminate');
            loadingStatus.textContent = 'Loading Arduino Uno example...';
            try {
                const resp = await fetch('/api/gerber/arduino-uno-example.zip');
                if (!resp.ok) throw new Error('Failed to fetch example');
                const blob = await resp.blob();
                const file = new File([blob], 'arduino-uno-example.zip', {type: 'application/zip'});
                loading.classList.add('hidden');
                progressBar.classList.remove('progress-bar-indeterminate');
                await loadFile(file);
            } catch (e) {
                alert('Failed to load example: ' + e.message);
                loading.classList.add('hidden');
                progressBar.classList.remove('progress-bar-indeterminate');
                dropZone.classList.remove('hidden');
            }
        }

        async function loadFile(file) {
            if (!file.name.endsWith('.zip')) { alert('Please select a ZIP file'); return; }
            const loadingStatus = document.getElementById('loading-status');
            const progressBar = document.querySelector('.progress-bar');
            dropZone.classList.add('hidden');
            loading.classList.remove('hidden');
            progressBar.classList.add('progress-bar-indeterminate');

            try {
                loadingStatus.textContent = 'Extracting ' + file.name + '...';
                const arrayBuffer = await file.arrayBuffer();
                const rawFiles = await extractZip(arrayBuffer);

                loadingStatus.textContent = 'Detected ' + rawFiles.length + ' files, analyzing...';
                projectName = file.name;
                projectFiles = rawFiles.map(f => {
                    const fileType = detectFileType(f.name, f.content);
                    const layerType = detectPcbLayerType(f.name, fileType, f.content);
                    const color = getLayerColor(f.name);
                    return {name: f.name, content: f.content, fileType, layerType, color};
                }).filter(f => f.fileType !== 'unknown');

                // Save to IndexedDB
                try { await saveProject(projectName, projectFiles); } catch(e) { console.warn('IndexedDB save failed', e); }

                loadingStatus.textContent = 'Rendering ' + projectFiles.length + ' layers...';
                await renderFromFiles(projectFiles);
            } catch (error) {
                alert('Error: ' + error.message);
                dropZone.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
                progressBar.classList.remove('progress-bar-indeterminate');
            }
        }

        async function renderFromFiles(files) {
            const data = await sendRenderRequest(files);
            if (data.error) throw new Error(data.error);

            layers = data.layers.map((layer, index) => ({...layer, visible: true, index}));
            combinedSvg = data.svg;
            realisticTopSvg = data.realisticTopSvg;
            realisticBottomSvg = data.realisticBottomSvg;
            components = data.components || [];
            renderCentroidTable();

            // Sync layer types back to projectFiles (in case server assigned IDs differently)
            for (let i = 0; i < layers.length && i < files.length; i++) {
                layers[i].layerType = files[i].layerType;
            }

            document.getElementById('view-tabs').style.display = 'flex';
            const topTab = document.querySelector('[data-view="top"]');
            const botTab = document.querySelector('[data-view="bottom"]');
            topTab.disabled = !realisticTopSvg; topTab.style.opacity = realisticTopSvg ? 1 : 0.4;
            botTab.disabled = !realisticBottomSvg; botTab.style.opacity = realisticBottomSvg ? 1 : 0.4;
            const pngTopBtn = document.getElementById('png-top-btn');
            const pngBotBtn = document.getElementById('png-bot-btn');
            pngTopBtn.disabled = !realisticTopSvg; pngTopBtn.style.opacity = realisticTopSvg ? 1 : 0.4;
            pngBotBtn.disabled = !realisticBottomSvg; pngBotBtn.style.opacity = realisticBottomSvg ? 1 : 0.4;

            currentView = 'layers';
            document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === 'layers'));
            renderSvg();
            renderLayerList();
            fitToView();
        }

        // ===== Re-open from IndexedDB =====
        async function reopenProject(id) {
            const loadingStatus = document.getElementById('loading-status');
            const progressBar = document.querySelector('.progress-bar');
            dropZone.classList.add('hidden');
            loading.classList.remove('hidden');
            progressBar.classList.add('progress-bar-indeterminate');

            try {
                const project = await loadProject(id);
                loadingStatus.textContent = 'Rendering ' + project.files.length + ' layers...';
                projectName = project.name;
                projectFiles = project.files;
                await renderFromFiles(projectFiles);
            } catch (error) {
                alert('Error: ' + error.message);
                dropZone.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
                progressBar.classList.remove('progress-bar-indeterminate');
            }
        }

        // ===== Layer list =====
        let visibilityBeforeHover = null; // saved state during hover-solo

        function renderLayerList() {
            if (layers.length === 0) {
                layerList.innerHTML = '<div class="no-layers">No layers loaded</div>';
                return;
            }
            commonPrefix = computeCommonPrefix(layers.map(l => l.name));
            layerList.innerHTML = layers.map((layer, index) => {
                const opts = LAYER_TYPES.map(t =>
                    `<option value="${t}" ${layer.layerType === t ? 'selected' : ''}>${LAYER_TYPE_LABELS[t]}</option>`
                ).join('');
                return `<div class="layer-item" data-index="${index}"
                        onmouseenter="hoverLayerStart(${index})"
                        onmouseleave="hoverLayerEnd()">
                    <input type="checkbox" ${layer.visible ? 'checked' : ''}
                        onclick="event.stopPropagation(); toggleLayer(${index})">
                    <div class="color-dot" style="background: ${layer.color}"></div>
                    <span class="name" title="${layer.name}" onclick="toggleLayer(${index})" style="cursor:pointer">${splitFilename(layer.name)}</span>
                    <select class="layer-type-select" onchange="changeLayerType(${index}, this.value)" onclick="event.stopPropagation()">
                        ${opts}
                    </select>
                </div>`;
            }).join('');
            updateSelectAllCheckbox();
        }

        function updateSelectAllCheckbox() {
            const cb = document.getElementById('select-all-layers');
            if (!cb || layers.length === 0) return;
            const visCount = layers.filter(l => l.visible).length;
            cb.checked = visCount === layers.length;
            cb.indeterminate = visCount > 0 && visCount < layers.length;
        }

        function toggleAllLayers() {
            const cb = document.getElementById('select-all-layers');
            const newState = cb.checked;
            layers.forEach(l => l.visible = newState);
            applyLayerVisibility();
            renderLayerList();
        }

        const TOP_TYPES = ['COPPER_TOP','SOLDERMASK_TOP','SILKSCREEN_TOP','PASTE_TOP','PNP_TOP'];
        const BOTTOM_TYPES = ['COPPER_BOTTOM','SOLDERMASK_BOTTOM','SILKSCREEN_BOTTOM','PASTE_BOTTOM','PNP_BOTTOM'];
        const SHARED_TYPES = ['OUTLINE','DRILL','DRILL_PLATED','DRILL_NON_PLATED'];

        function selectSide(side) {
            const sideTypes = side === 'top' ? TOP_TYPES : BOTTOM_TYPES;
            layers.forEach(l => {
                l.visible = sideTypes.includes(l.layerType) || SHARED_TYPES.includes(l.layerType);
            });
            applyLayerVisibility();
            renderLayerList();
        }

        function toggleLayer(index) {
            layers[index].visible = !layers[index].visible;
            applyLayerVisibility();
            renderLayerList();
        }

        function applyLayerVisibility() {
            if (currentView !== 'layers') return;
            for (const layer of layers) {
                const el = svgContent.querySelector(`#${CSS.escape(layer.id)}`);
                if (el) el.setAttribute('display', layer.visible ? 'inline' : 'none');
            }
        }

        function hoverLayerStart(index) {
            if (currentView !== 'layers') return;
            // Save current visibility state and solo the hovered layer
            visibilityBeforeHover = layers.map(l => l.visible);
            for (let i = 0; i < layers.length; i++) {
                const el = svgContent.querySelector(`#${CSS.escape(layers[i].id)}`);
                if (el) el.setAttribute('display', i === index ? 'inline' : 'none');
            }
        }

        function hoverLayerEnd() {
            if (currentView !== 'layers' || !visibilityBeforeHover) return;
            // Restore saved visibility state
            for (let i = 0; i < layers.length; i++) {
                const el = svgContent.querySelector(`#${CSS.escape(layers[i].id)}`);
                if (el) el.setAttribute('display', visibilityBeforeHover[i] ? 'inline' : 'none');
            }
            visibilityBeforeHover = null;
        }

        let typeChangeTimer = null;
        async function changeLayerType(index, newType) {
            layers[index].layerType = newType;
            if (projectFiles[index]) projectFiles[index].layerType = newType;
            // Save updated types to IndexedDB
            try { await saveProject(projectName, projectFiles); } catch(e) {}
            // Debounce server call
            clearTimeout(typeChangeTimer);
            typeChangeTimer = setTimeout(async () => {
                try {
                    const data = await sendRenderRequest(projectFiles);
                    combinedSvg = data.svg;
                    realisticTopSvg = data.realisticTopSvg;
                    realisticBottomSvg = data.realisticBottomSvg;
                    const topTab = document.querySelector('[data-view="top"]');
                    const botTab = document.querySelector('[data-view="bottom"]');
                    topTab.disabled = !realisticTopSvg; topTab.style.opacity = realisticTopSvg ? 1 : 0.4;
                    botTab.disabled = !realisticBottomSvg; botTab.style.opacity = realisticBottomSvg ? 1 : 0.4;
                    const pngTopBtn = document.getElementById('png-top-btn');
                    const pngBotBtn = document.getElementById('png-bot-btn');
                    pngTopBtn.disabled = !realisticTopSvg; pngTopBtn.style.opacity = realisticTopSvg ? 1 : 0.4;
                    pngBotBtn.disabled = !realisticBottomSvg; pngBotBtn.style.opacity = realisticBottomSvg ? 1 : 0.4;
                    renderSvg();
                    if (currentView !== 'layers') fitToView();
                } catch (e) { console.error('Re-render failed:', e); }
            }, 500);
        }

        // ===== SVG rendering =====
        function renderSvg() {
            let svgStr = null, flipX = false;
            if (currentView === 'layers') svgStr = combinedSvg;
            else if (currentView === 'top') svgStr = realisticTopSvg;
            else if (currentView === 'bottom') { svgStr = realisticBottomSvg; flipX = true; }

            if (!svgStr) {
                svgContent.innerHTML = '<div style="color:#666;text-align:center;padding:40px;">No realistic view available.<br><small>Ensure an Outline layer type is assigned.</small></div>';
                return;
            }
            const parser = new DOMParser();
            const doc = parser.parseFromString(svgStr, 'image/svg+xml');
            const svg = doc.querySelector('svg');
            if (svg) {
                const vb = svg.getAttribute('viewBox');
                if (vb) {
                    const [,,w,h] = vb.split(' ').map(Number);
                    svg.setAttribute('width', w + 'mm');
                    svg.setAttribute('height', h + 'mm');
                }
                svg.style.overflow = 'visible';
                if (flipX && vb) {
                    const [vx,,vw] = vb.split(' ').map(Number);
                    const viewport = svg.querySelector('#viewport');
                    if (viewport) {
                        const t = viewport.getAttribute('transform') || '';
                        viewport.setAttribute('transform', `translate(${vx + vw + vx}, 0) scale(-1, 1) ${t}`);
                    }
                }
                svgContent.innerHTML = '';
                svgContent.appendChild(svg);
            }
            updateTransform();
        }

        function switchView(view) {
            if (view === 'top' && !realisticTopSvg) return;
            if (view === 'bottom' && !realisticBottomSvg) return;
            if (view === 'centroid' && (!components || components.length === 0)) return;
            currentView = view;
            document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
            const vc = document.getElementById('viewer-container');
            const cp = document.getElementById('centroid-panel');
            if (view === 'centroid') {
                vc.classList.add('hidden');
                cp.classList.remove('hidden');
                refreshCentroidTable();
            } else {
                cp.classList.add('hidden');
                vc.classList.remove('hidden');
                renderSvg();
                fitToView();
            }
        }

        // ===== Pan & Zoom =====
        svgContainer.addEventListener('mousedown', (e) => {
            if (e.button === 0) { isPanning = true; startX = e.clientX - panX; startY = e.clientY - panY; }
        });
        document.addEventListener('mousemove', (e) => {
            if (isPanning) { panX = e.clientX - startX; panY = e.clientY - startY; updateTransform(); }
        });
        document.addEventListener('mouseup', () => { isPanning = false; });

        svgContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = svgContainer.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            const ns = Math.max(0.1, Math.min(50, scale * delta));
            panX = mx - (mx - panX) * (ns / scale);
            panY = my - (my - panY) * (ns / scale);
            scale = ns;
            updateTransform();
        });

        document.getElementById('zoom-in').addEventListener('click', () => {
            const r = svgContainer.getBoundingClientRect();
            const cx = r.width/2, cy = r.height/2;
            const ns = Math.min(50, scale * 1.25);
            panX = cx - (cx - panX) * (ns / scale); panY = cy - (cy - panY) * (ns / scale);
            scale = ns; updateTransform();
        });
        document.getElementById('zoom-out').addEventListener('click', () => {
            const r = svgContainer.getBoundingClientRect();
            const cx = r.width/2, cy = r.height/2;
            const ns = Math.max(0.1, scale * 0.8);
            panX = cx - (cx - panX) * (ns / scale); panY = cy - (cy - panY) * (ns / scale);
            scale = ns; updateTransform();
        });
        document.getElementById('zoom-fit').addEventListener('click', fitToView);

        function fitToView() {
            const svg = svgContent.querySelector('svg');
            if (!svg) return;
            const rect = svgContainer.getBoundingClientRect();
            const vb = svg.getAttribute('viewBox');
            if (!vb) return;
            const [,,w,h] = vb.split(' ').map(Number);
            const pxPerMm = 3.78;
            const sw = w * pxPerMm, sh = h * pxPerMm;
            const pad = 40;
            scale = Math.min((rect.width - pad*2) / sw, (rect.height - pad*2) / sh, 10);
            panX = (rect.width - sw * scale) / 2;
            panY = (rect.height - sh * scale) / 2;
            updateTransform();
        }

        function updateTransform() {
            svgContent.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            zoomLevel.textContent = Math.round(scale * 100) + '%';
        }

        // ===== Centroid table =====
        let centroidSortCol = 'refdes';
        let centroidSortAsc = true;

        function renderCentroidTable() {
            const tab = document.getElementById('centroid-tab');
            if (!tab) return;
            if (!components || components.length === 0) {
                tab.disabled = true;
                tab.style.opacity = '0.4';
                tab.textContent = 'Centroid';
                return;
            }
            tab.disabled = false;
            tab.style.opacity = '1';
            tab.textContent = `Centroid (${components.length})`;
        }

        function refreshCentroidTable() {
            const search = (document.getElementById('centroid-search')?.value || '').toLowerCase();
            let filtered = components.filter(c =>
                !search ||
                c.refdes.toLowerCase().includes(search) ||
                (c.value || '').toLowerCase().includes(search) ||
                (c.footprint || '').toLowerCase().includes(search)
            );

            filtered.sort((a, b) => {
                const dir = centroidSortAsc ? 1 : -1;
                const va = a[centroidSortCol] ?? '', vb = b[centroidSortCol] ?? '';
                if (centroidSortCol === 'refdes') {
                    return dir * va.localeCompare(vb, undefined, {numeric: true});
                }
                if (typeof va === 'number') return dir * (va - vb);
                return dir * String(va).localeCompare(String(vb));
            });

            const countEl = document.getElementById('centroid-toolbar-count');
            if (countEl) countEl.textContent = filtered.length === components.length
                ? `${components.length} component${components.length !== 1 ? 's' : ''}`
                : `${filtered.length} of ${components.length} components`;

            document.querySelectorAll('.centroid-table thead th[data-col]').forEach(th => {
                th.classList.remove('sorted-asc', 'sorted-desc');
                if (th.dataset.col === centroidSortCol) {
                    th.classList.add(centroidSortAsc ? 'sorted-asc' : 'sorted-desc');
                }
            });

            const tbody = document.getElementById('centroid-tbody');
            tbody.innerHTML = filtered.map((c, i) => {
                const sideClass = (c.side || '').toLowerCase() === 'top' ? 'side-top' : 'side-bottom';
                return `<tr>
                    <td class="centroid-num">${i + 1}</td>
                    <td><span class="centroid-refdes-pill ${sideClass}">${escapeHtml(c.refdes)}</span></td>
                    <td>${escapeHtml(c.side || '')}</td>
                    <td>${escapeHtml(c.value || '—')}</td>
                    <td>${escapeHtml(c.footprint || '—')}</td>
                    <td>${c.x.toFixed(4)}</td>
                    <td>${c.y.toFixed(4)}</td>
                    <td>${c.rotation}°</td>
                    <td>${escapeHtml(c.mountType || '')}</td>
                </tr>`;
            }).join('');
        }

        function filterCentroidTable() { refreshCentroidTable(); }

        function sortCentroidTable(col) {
            centroidSortAsc = centroidSortCol === col ? !centroidSortAsc : true;
            centroidSortCol = col;
            refreshCentroidTable();
        }

        function escapeHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function exportCentroidCsv() {
            if (!components || components.length === 0) return;
            const sorted = [...components].sort((a, b) =>
                a.refdes.localeCompare(b.refdes, undefined, {numeric: true}));
            const lines = ['Designator,Value,Footprint,MountType,X_mm,Y_mm,Rotation_deg,Side'];
            for (const c of sorted) {
                lines.push([c.refdes, c.value, c.footprint, c.mountType,
                    c.x.toFixed(4), c.y.toFixed(4), c.rotation, c.side
                ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
            }
            const blob = new Blob([lines.join('\r\n')], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const base = (projectName || 'board').replace(/[^a-zA-Z0-9._-]/g, '_');
            a.download = `${base}-centroid.csv`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        // ===== Sidebar resize =====
        (function initSidebarResize() {
            const sidebar = document.querySelector('.sidebar');
            const resizer = document.getElementById('sidebar-resizer');
            const MIN = 180, MAX = 600;
            const stored = parseInt(localStorage.getItem('gerber-viewer-sidebar-width'), 10);
            if (!isNaN(stored) && stored >= MIN && stored <= MAX) {
                sidebar.style.width = stored + 'px';
            }
            let dragging = false;
            resizer.addEventListener('mousedown', (e) => {
                dragging = true;
                resizer.classList.add('dragging');
                document.body.classList.add('resizing-sidebar');
                e.preventDefault();
            });
            document.addEventListener('mousemove', (e) => {
                if (!dragging) return;
                const rect = sidebar.getBoundingClientRect();
                let w = e.clientX - rect.left;
                if (w < MIN) w = MIN;
                if (w > MAX) w = MAX;
                sidebar.style.width = w + 'px';
            });
            document.addEventListener('mouseup', () => {
                if (!dragging) return;
                dragging = false;
                resizer.classList.remove('dragging');
                document.body.classList.remove('resizing-sidebar');
                localStorage.setItem('gerber-viewer-sidebar-width', parseInt(sidebar.style.width, 10));
            });
        })();

        // ===== Theme toggle =====
        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            document.body.classList.toggle('light', !isDark);
            localStorage.setItem('gerber-viewer-theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const isDark = document.body.classList.contains('dark');
            const rays = document.getElementById('theme-icon-rays');
            if (rays) rays.style.display = isDark ? '' : 'none';
        }

        function applyStoredTheme() {
            const stored = localStorage.getItem('gerber-viewer-theme');
            let isDark;
            if (stored) {
                isDark = stored === 'dark';
            } else {
                isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            }
            document.body.classList.toggle('dark', isDark);
            document.body.classList.toggle('light', !isDark);
            updateThemeIcon();
        }
        applyStoredTheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (!localStorage.getItem('gerber-viewer-theme')) applyStoredTheme();
        });

        // ===== Init: show recent projects =====
        (async function init() {
            updateTransform();
            try {
                const projects = await listProjects();
                if (projects.length > 0) {
                    const section = document.getElementById('recent-section');
                    const list = document.getElementById('recent-list');
                    section.classList.remove('hidden');
                    list.innerHTML = projects.map(p => {
                        const date = new Date(p.timestamp).toLocaleDateString();
                        return `<div class="recent-item" onclick="reopenProject(${p.id})">
                            <span>${p.name}</span>
                            <span class="date">${date}</span>
                        </div>`;
                    }).join('');
                }
            } catch (e) { console.warn('IndexedDB not available', e); }
        })();
    </script>
</body>
</html>
